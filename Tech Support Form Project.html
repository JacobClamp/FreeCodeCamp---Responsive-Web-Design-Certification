<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Survey Form</title>
  </head>

  <body>
    <h1 id="title"> Tech Support Feedback Form</h1>
    <p id="description">This form is to understand your tech support issues</p>

    <form id="survey-form">
      <label for="name-label" id="name-label">Name</label>
      <input type="text" id="name"  placeholder="Jonny Jon" required>

      <br>
      <label for="email-label" id="email-label">Email</label>
      <input type="email" id="email" placeholder="jonnyjon@gmail.com" required>

      <br>
      <label for="number" id="number-label">Device Number (Optional)</label>
      <input type="number" id="number" min="1" max="15" placeholder="0">
      <br>

      <label>Device Type</label>
      <select id="dropdown">
        <option>PC</option>
        <option>Laptop</option>
        <option>Phone</option>
        <option>Tablet</option>
        <option>Printer</option>
      </select>
      <br>

      <label>Was your issue resolved?</label>
      <label for="yes">Yes</label>
      <input type="radio" name="resolvement" id="yes" value="yes">
      <label for-"no">No</label>
      <input type="radio" name="resolvement" id="no" value="no">
      <br>

      <label>What issues did you have?</label>
      <br>
      <label>Email</label>
      <input type="checkbox" value="email">
      <label>Password</label>
      <input type="checkbox" value="password">
      <label>Printer</label>
      <input type="checkbox" value="printer">
      <label>Software</label>
      <input type="checkbox" value="software">
      <label>Setup</label>
      <input type="checkbox" value="setup">
      <br>

      <label for="comments">Additional comments</label>
      <textarea id="comments" rows="5" cols="30"></textarea>
      <br>
      <br>
      <button id="submit">Submit</button>

      

    </form>
  </body>
</html>
